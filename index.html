<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Simple WebRTC File Share</title>
  <style>
    body {
      font-family: Arial;
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 120px;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
    }

    #status {
      margin-top: 20px;
      font-weight: bold;
      color: green;
    }
  </style>
</head>
<body>

<h2>WebRTC File Share</h2>

<button onclick="createOffer()">Create Connection</button>
<button onclick="createAnswer()">Connect to Offer</button>

<h3>Your Signal</h3>
<textarea id="localSignal"></textarea>

<h3>Paste Remote Signal</h3>
<textarea id="remoteSignal"></textarea>

<button onclick="applyRemoteSignal()">Apply Remote Signal</button>

<hr>

<input type="file" id="fileInput">
<button onclick="sendFile()">Send File</button>

<div id="status"></div>

<script>
let pc = new RTCPeerConnection({
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" }
  ]
});

let channel;

pc.ondatachannel = event => {
  channel = event.channel;
  setupChannel();
};

function setupChannel() {
  channel.onopen = () => {
    document.getElementById("status").innerText =
      "Connected!";
  };

  channel.onmessage = async event => {
    const blob = event.data;

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "received_file";
    a.click();
  };
}

async function createOffer() {
  channel = pc.createDataChannel("fileChannel");
  setupChannel();

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  pc.onicecandidate = () => {
    document.getElementById("localSignal").value =
      JSON.stringify(pc.localDescription);
  };
}

async function createAnswer() {
  const remote = JSON.parse(
    document.getElementById("remoteSignal").value
  );

  await pc.setRemoteDescription(remote);

  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  pc.onicecandidate = () => {
    document.getElementById("localSignal").value =
      JSON.stringify(pc.localDescription);
  };
}

async function applyRemoteSignal() {
  const remote = JSON.parse(
    document.getElementById("remoteSignal").value
  );

  await pc.setRemoteDescription(remote);
}

function sendFile() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Choose file first");
    return;
  }

  channel.send(file);

  document.getElementById("status").innerText =
    "File sent!";
}
</script>

</body>
</html>
