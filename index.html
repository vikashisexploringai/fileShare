<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirShare · Fixed WebRTC</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #0a2a2a 0%, #0d3d3d 100%);
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 1.5rem;
            color: #e0f2f0;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 2rem; }
        h1 { font-size: 2rem; background: linear-gradient(120deg, #a8ffec, #4fc3b7); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .badge { display: inline-block; background: #1e6b5e; padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.7rem; margin-top: 0.5rem; }
        .role-selector { display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; }
        .role-btn { background: #1c4f4a; border: none; padding: 0.7rem 1.8rem; border-radius: 60px; color: white; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .role-btn.active { background: #2ecc71; color: #0a2a2a; box-shadow: 0 0 12px #2ecc71; }
        .panel { background: rgba(18, 45, 45, 0.85); backdrop-filter: blur(12px); border-radius: 2rem; padding: 1.8rem; border: 1px solid #4fc3b7; display: none; margin-bottom: 1rem; }
        .panel.active-panel { display: block; }
        .code-card { background: #0a2a2a; border-radius: 1.5rem; padding: 1.5rem; text-align: center; margin: 1.5rem 0; }
        .big-code { font-size: 3rem; font-weight: 800; letter-spacing: 6px; font-family: monospace; background: linear-gradient(135deg, #2ecc71, #4fc3b7); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .flex-input { display: flex; gap: 0.6rem; margin: 1rem 0; flex-wrap: wrap; }
        .flex-input input { flex: 2; padding: 0.9rem; font-size: 1.2rem; text-align: center; font-family: monospace; background: #0a2a2a; border: 2px solid #4fc3b7; border-radius: 1rem; color: #2ecc71; }
        button { background: #2ecc71; border: none; padding: 0.7rem 1.5rem; border-radius: 60px; font-weight: bold; cursor: pointer; transition: 0.15s; font-size: 0.9rem; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .file-dropzone { border: 2px dashed #4fc3b7; border-radius: 1.2rem; padding: 1.2rem; text-align: center; margin: 1rem 0; cursor: pointer; background: #0e3530; }
        .status-box { padding: 0.7rem; border-radius: 1rem; margin: 1rem 0; font-size: 0.85rem; background: #0a2a2a; font-family: monospace; }
        .log { font-family: monospace; font-size: 0.7rem; background: #051a1a; border-radius: 1rem; padding: 0.8rem; max-height: 150px; overflow-y: auto; margin-top: 1rem; }
        .info-note { background: #1e5a50; border-radius: 1rem; padding: 0.6rem; font-size: 0.7rem; margin-top: 1rem; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚡ AirShare · Fixed WebRTC</h1>
        <div class="badge">🔐 Same-device & cross-device working</div>
    </div>

    <div class="role-selector">
        <button class="role-btn" id="senderRoleBtn">📤 I'm Sender (Share file)</button>
        <button class="role-btn" id="receiverRoleBtn">📥 I'm Receiver (Get file)</button>
    </div>

    <div id="senderPanel" class="panel">
        <h2>📤 Send a file</h2>
        <div class="file-dropzone" id="senderDropzone">
            📂 Click to select file
            <input type="file" id="fileInput" style="display: none;">
        </div>
        <div id="fileInfo" style="margin: 0.5rem 0; font-size: 0.85rem;"></div>
        <button id="createCodeBtn" style="width: 100%; margin: 0.5rem 0;">🔗 Generate Share Code</button>
        <div id="codeArea" style="display: none;">
            <div class="code-card">
                <p>📢 Share this code with receiver:</p>
                <div class="big-code" id="displayCode">----</div>
                <button id="copyCodeBtn">📋 Copy Code</button>
            </div>
        </div>
        <div class="status-box" id="senderStatus">⚡ Waiting...</div>
        <button id="sendFileBtn" disabled style="width: 100%;">📡 Send File</button>
        <div class="log" id="senderLog">📭 Ready.\n</div>
    </div>

    <div id="receiverPanel" class="panel">
        <h2>📥 Receive a file</h2>
        <div class="flex-input">
            <input type="text" id="codeInput" placeholder="Enter 6-char code" maxlength="8" style="text-transform: uppercase;">
            <button id="connectBtn">🔗 Connect</button>
        </div>
        <div class="status-box" id="receiverStatus">⏳ Enter code</div>
        <div id="downloadArea" style="display: none;">
            <button id="downloadBtn" disabled style="width: 100%; margin: 1rem 0;">⬇️ Download File</button>
        </div>
        <div class="log" id="receiverLog">📭 Enter code to receive file.\n</div>
    </div>
</div>

<script type="module">
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBhujqx9CZwK_NUrQgcUEX5wxKS0hYjXKc",
        authDomain: "vikash-classes-c98f8.firebaseapp.com",
        projectId: "vikash-classes-c98f8",
        storageBucket: "vikash-classes-c98f8.firebasestorage.app",
        messagingSenderId: "456891384843",
        appId: "1:456891384843:web:cf845b07c2884a4c64b30e"
    };
    
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js';
    import { getFirestore, doc, setDoc, getDoc, deleteDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js';
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app, 'shortener');
    
    // WebRTC Config
    const configuration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
        ]
    };
    
    // State
    let peerConnection = null;
    let dataChannel = null;
    let currentCode = null;
    let selectedFile = null;
    let receivedChunks = [];
    let receivedMetadata = null;
    let isSender = true;
    
    // DOM
    const senderPanel = document.getElementById('senderPanel');
    const receiverPanel = document.getElementById('receiverPanel');
    const senderBtn = document.getElementById('senderRoleBtn');
    const receiverBtn = document.getElementById('receiverRoleBtn');
    const createCodeBtn = document.getElementById('createCodeBtn');
    const codeArea = document.getElementById('codeArea');
    const displayCode = document.getElementById('displayCode');
    const copyCodeBtn = document.getElementById('copyCodeBtn');
    const sendFileBtn = document.getElementById('sendFileBtn');
    const senderStatus = document.getElementById('senderStatus');
    const senderLog = document.getElementById('senderLog');
    const codeInput = document.getElementById('codeInput');
    const connectBtn = document.getElementById('connectBtn');
    const receiverStatus = document.getElementById('receiverStatus');
    const receiverLog = document.getElementById('receiverLog');
    const downloadArea = document.getElementById('downloadArea');
    const downloadBtn = document.getElementById('downloadBtn');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const dropzone = document.getElementById('senderDropzone');
    
    function logSender(msg) { senderLog.innerText += `\n> ${msg}`; senderLog.scrollTop = senderLog.scrollHeight; }
    function logReceiver(msg) { receiverLog.innerText += `\n> ${msg}`; receiverLog.scrollTop = receiverLog.scrollHeight; }
    
    function generateCode() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';
        let code = '';
        for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
        return code;
    }
    
    // SENDER: Create offer and store in Firebase
    async function createOffer(code) {
        if (peerConnection) peerConnection.close();
        
        peerConnection = new RTCPeerConnection(configuration);
        dataChannel = peerConnection.createDataChannel('fileTransfer');
        
        dataChannel.onopen = () => {
            logSender('✅ Data channel OPEN! Receiver connected.');
            senderStatus.innerText = '✅ Connected! Click Send File.';
            sendFileBtn.disabled = false;
        };
        
        dataChannel.onclose = () => {
            logSender('⚠️ Data channel closed');
            sendFileBtn.disabled = true;
        };
        
        peerConnection.onicecandidate = async (event) => {
            if (event.candidate) {
                // Send candidate to Firebase
                const candidateRef = doc(db, 'candidates', `${code}_sender`);
                await setDoc(candidateRef, {
                    candidate: event.candidate,
                    timestamp: Date.now()
                });
            } else {
                logSender('✅ ICE gathering complete');
            }
        };
        
        // Create and store offer
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        
        await setDoc(doc(db, 'offers', code), {
            offer: { type: offer.type, sdp: offer.sdp },
            createdAt: Date.now()
        });
        
        logSender(`📡 Offer created for code: ${code}`);
        
        // Listen for answer from receiver
        const unsubscribe = onSnapshot(doc(db, 'answers', code), async (docSnap) => {
            if (docSnap.exists() && !peerConnection.currentRemoteDescription) {
                const answer = docSnap.data().answer;
                await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                logSender('✅ Answer received from receiver');
                unsubscribe();
            }
        });
        
        // Listen for receiver ICE candidates
        const candidateUnsub = onSnapshot(doc(db, 'candidates', `${code}_receiver`), async (docSnap) => {
            if (docSnap.exists() && peerConnection.remoteDescription) {
                const candidate = docSnap.data().candidate;
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                    logSender('📡 ICE candidate added');
                } catch(e) { console.warn(e); }
            }
        });
    }
    
    // RECEIVER: Fetch offer and send answer
    async function connectToOffer(code) {
        if (peerConnection) peerConnection.close();
        
        // Get offer
        const offerDoc = await getDoc(doc(db, 'offers', code));
        if (!offerDoc.exists()) {
            receiverStatus.innerText = `❌ Code ${code} not found`;
            logReceiver(`No offer for code: ${code}`);
            return false;
        }
        
        const offerData = offerDoc.data().offer;
        peerConnection = new RTCPeerConnection(configuration);
        
        peerConnection.ondatachannel = (event) => {
            dataChannel = event.channel;
            setupReceiverChannel(dataChannel);
            logReceiver('✅ Data channel established');
        };
        
        peerConnection.onicecandidate = async (event) => {
            if (event.candidate) {
                await setDoc(doc(db, 'candidates', `${code}_receiver`), {
                    candidate: event.candidate,
                    timestamp: Date.now()
                });
            }
        };
        
        await peerConnection.setRemoteDescription(new RTCSessionDescription(offerData));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        
        await setDoc(doc(db, 'answers', code), {
            answer: { type: answer.type, sdp: answer.sdp },
            createdAt: Date.now()
        });
        
        receiverStatus.innerText = `✅ Connected! Waiting for file...`;
        logReceiver(`Connected to code: ${code}`);
        return true;
    }
    
    function setupReceiverChannel(channel) {
        receivedChunks = [];
        receivedMetadata = null;
        
        channel.onmessage = (event) => {
            if (typeof event.data === 'string') {
                try {
                    const meta = JSON.parse(event.data);
                    if (meta.type === 'metadata') {
                        receivedMetadata = meta.data;
                        receiverStatus.innerText = `📥 Receiving ${receivedMetadata.name}...`;
                        logReceiver(`Receiving: ${receivedMetadata.name} (${(receivedMetadata.size/1024).toFixed(1)} KB)`);
                    } else if (meta.type === 'complete') {
                        const blob = new Blob(receivedChunks, { type: receivedMetadata?.type || 'application/octet-stream' });
                        const url = URL.createObjectURL(blob);
                        downloadBtn.onclick = () => {
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = receivedMetadata?.name || 'download';
                            a.click();
                            URL.revokeObjectURL(url);
                            logReceiver(`✅ Downloaded: ${receivedMetadata?.name}`);
                            downloadBtn.disabled = true;
                        };
                        downloadBtn.disabled = false;
                        downloadArea.style.display = 'block';
                        receiverStatus.innerText = `✅ File ready! Click Download.`;
                        logReceiver(`File transfer complete`);
                    }
                } catch(e) {}
            } else if (event.data instanceof ArrayBuffer) {
                receivedChunks.push(event.data);
                const received = receivedChunks.reduce((s, c) => s + c.byteLength, 0);
                if (receivedMetadata) {
                    const percent = ((received / receivedMetadata.size) * 100).toFixed(1);
                    receiverStatus.innerText = `📥 Receiving... ${percent}%`;
                }
            }
        };
    }
    
    function sendFile(file) {
        if (!dataChannel || dataChannel.readyState !== 'open') {
            logSender('❌ Not connected');
            return;
        }
        
        const CHUNK_SIZE = 16384;
        let offset = 0;
        
        dataChannel.send(JSON.stringify({
            type: 'metadata',
            data: { name: file.name, type: file.type, size: file.size }
        }));
        
        const reader = new FileReader();
        function sendNext() {
            const slice = file.slice(offset, offset + CHUNK_SIZE);
            reader.onload = (e) => {
                dataChannel.send(e.target.result);
                offset += e.target.result.byteLength;
                const percent = ((offset / file.size) * 100).toFixed(1);
                logSender(`📤 Sending... ${percent}%`);
                if (offset < file.size) {
                    sendNext();
                } else {
                    dataChannel.send(JSON.stringify({ type: 'complete' }));
                    logSender(`✅ File sent!`);
                    senderStatus.innerText = '✅ File sent successfully!';
                    sendFileBtn.disabled = true;
                }
            };
            reader.readAsArrayBuffer(slice);
        }
        sendNext();
    }
    
    // File selection
    fileInput.onchange = (e) => {
        if (e.target.files[0]) {
            selectedFile = e.target.files[0];
            fileInfo.innerText = `📄 ${selectedFile.name} (${(selectedFile.size/1024).toFixed(1)} KB)`;
            logSender(`Selected: ${selectedFile.name}`);
        }
    };
    dropzone.onclick = () => fileInput.click();
    
    // UI Actions
    createCodeBtn.onclick = async () => {
        if (!selectedFile) {
            alert('Please select a file first');
            return;
        }
        const code = generateCode();
        currentCode = code;
        displayCode.innerText = code;
        codeArea.style.display = 'block';
        await createOffer(code);
        senderStatus.innerText = `📢 Code: ${code} - Share with receiver`;
        logSender(`Share code: ${code}`);
    };
    
    copyCodeBtn.onclick = () => {
        if (currentCode) {
            navigator.clipboard.writeText(currentCode);
            logSender('Code copied');
        }
    };
    
    sendFileBtn.onclick = () => {
        if (selectedFile && dataChannel?.readyState === 'open') {
            sendFile(selectedFile);
        } else {
            logSender('No connection. Wait for receiver to connect.');
        }
    };
    
    connectBtn.onclick = async () => {
        const code = codeInput.value.trim().toUpperCase();
        if (!code) {
            alert('Enter a code');
            return;
        }
        await connectToOffer(code);
    };
    
    // Role switching
    senderBtn.onclick = () => {
        isSender = true;
        senderBtn.classList.add('active');
        receiverBtn.classList.remove('active');
        senderPanel.classList.add('active-panel');
        receiverPanel.classList.remove('active-panel');
        if (peerConnection) peerConnection.close();
    };
    
    receiverBtn.onclick = () => {
        isSender = false;
        receiverBtn.classList.add('active');
        senderBtn.classList.remove('active');
        receiverPanel.classList.add('active-panel');
        senderPanel.classList.remove('active-panel');
        if (peerConnection) peerConnection.close();
        downloadArea.style.display = 'none';
        codeInput.value = '';
    };
    
    senderBtn.click();
</script>
</body>
</html>
